<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulación de PowerPoint</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
        }

        .slideshow-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: white;
        }

        .slide {
            display: none;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
        }

        .slide.active {
            display: flex;
        }

        .slide h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .slide p {
            font-size: 1.2em;
        }

        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            margin-top: -22px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
            background-color: rgba(0,0,0,0.5);
        }

        .next {
            right: 0;
            border-radius: 3px 0 0 3px;
        }
        
        .prev {
            left: 0;
        }

        .prev:hover, .next:hover {
            background-color: rgba(0,0,0,0.8);
        }

        .slide-number {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="slideshow-container">
        
        <div class="slide active">
            <h1>Diapositiva 1</h1>
            <p>Este es el contenido de la primera diapositiva.</p>
            <div class="slide-number">1 / 3</div>
        </div>

        <div class="slide">
            <h1>Diapositiva 2</h1>
            <p>Aquí puedes añadir imágenes, texto o cualquier otro contenido HTML.</p>
            <div class="slide-number">2 / 3</div>
        </div>

        <div class="slide">
            <h1>Diapositiva 3</h1>
            <p>Fin de la presentación.</p>
            <div class="slide-number">3 / 3</div>
        </div>

        <a class="prev" onclick="changeSlide(-1)">&#10094;</a>
        <a class="next" onclick="changeSlide(1)">&#10095;</a>
    </div>

    <script>
        let currentSlideIndex = 0;
        const slides = document.querySelectorAll('.slide');

        function showSlide(index) {
            slides.forEach((slide, i) => {
                slide.classList.remove('active');
                if (i === index) {
                    slide.classList.add('active');
                }
            });
        }

        function changeSlide(n) {
            currentSlideIndex += n;
            if (currentSlideIndex >= slides.length) {
                currentSlideIndex = 0;
            }
            if (currentSlideIndex < 0) {
                currentSlideIndex = slides.length - 1;
            }
            showSlide(currentSlideIndex);
        }

        // Mostrar la primera diapositiva al cargar
        showSlide(currentSlideIndex);
    </script>

</body>
</html>
