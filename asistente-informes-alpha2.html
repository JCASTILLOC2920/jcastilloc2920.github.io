<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA ALPHA 2 | Generador de Informes de Élite</title>
    <style>
        body { background: #020617; color: #94a3b8; font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .container { background: #0f172a; padding: 30px; border-radius: 20px; border: 1px solid #1e293b; width: 80%; max-width: 800px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { color: #00E5FF; text-transform: uppercase; letter-spacing: 5px; font-size: 1.5rem; border-bottom: 2px solid #00E5FF; padding-bottom: 10px; margin-bottom: 30px; }
        textarea { width: 100%; height: 200px; background: #020617; border: 1px solid #334155; color: white; padding: 20px; border-radius: 10px; font-size: 1rem; resize: none; margin-bottom: 20px; }
        button { background: #00E5FF; color: #020617; border: none; padding: 15px 30px; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%; text-transform: uppercase; }
        button:hover { background: #E0E0E0; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,229,255,0.3); }
        .result { margin-top: 30px; background: #020617; padding: 20px; border-radius: 10px; border: 1px dashed #334155; white-space: pre-wrap; display: none; color: #e2e8f0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ALPHA 2: Redactor Patológico</h1>
        <p>Escriba los hallazgos microscópicos clave y la IA redactará el diagnóstico técnico completo.</p>
        <textarea id="findings" placeholder="Ejemplo: Biopsia gastrica, antro, helicobacter ++, inflamacion cronica moderada..."></textarea>
        <button onclick="generate()">Generar Informe con IA Alpha 2</button>
        <div id="result" class="result"></div>
    </div>

    <script>
        async function generate() {
            const btn = document.querySelector('button');
            const findings = document.getElementById('findings').value;
            const resDiv = document.getElementById('result');
            
            if(!findings) return alert("Ingrese hallazgos.");
            
            btn.innerText = "PROCESANDO EN NÚCLEO ALPHA 2...";
            btn.disabled = true;

            // Simulación de conexión con el Tactical Server (Elena/Alpha 2)
            setTimeout(() => {
                const report = `
INFORME ANATOMOPATOLÓGICO EXPERTO (ALPHA 2)
------------------------------------------
HALLAZGOS: ${findings}

DIAGNÓSTICO TÉCNICO:
Se observan fragmentos de tejido que corresponden a la descripción remitida. Al examen microscópico se evidencia una proliferación celular acorde con los hallazgos reportadores, mostrando [CORRELACIÓN TÉCNICA SUGERIDA]. 

SUGERENCIA: Realizar seguimiento clínico estrecho y correlación con estudios de imagen.
------------------------------------------
GENERADO POR IA SOBERANA - JC PATH LAB
`;
                resDiv.innerText = report;
                resDiv.style.display = 'block';
                btn.innerText = "GENERAR OTRO INFORME";
                btn.disabled = false;
            }, 2000);
        }
    </script>
</body>
</html>
