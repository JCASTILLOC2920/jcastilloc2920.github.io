<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro - JC Path Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: radial-gradient(circle at center, #172A45 0%, #0A192F 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }
        .login-logo {
            width: 120px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 10px rgba(100, 255, 218, 0.3));
        }
        .login-card {
            padding: 40px;
            border-radius: 24px;
        }
        h2 {
            color: #ffffff;
            font-weight: 800;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            position: relative;
            text-align: left;
        }
        .input-group label {
            display: block;
            color: #64FFDA;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            outline: none;
            border-color: #64FFDA;
            background: rgba(100, 255, 218, 0.05);
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.2);
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: #64FFDA;
            color: #0A192F;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(100, 255, 218, 0.3);
            filter: brightness(1.1);
        }
        .error-message {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .footer-text {
            margin-top: 30px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="login-container float-animation">
        <img src="logo-jcpathlab.png" alt="JC Path Lab" class="login-logo">
        
        <div class="login-card glass-card">
            <h2>Acceso a Resultados</h2>
            <p>Sistema de Seguridad para la protección de datos del paciente.</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Usuario de Paciente</label>
                    <input type="text" id="username" placeholder="Ingrese su usuario" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="login-btn">INGRESAR AL SISTEMA</button>
                <div id="errorMessage" class="error-message">
                    <i class="fas fa-exclamation-circle"></i> Credenciales incorrectas. Intente de nuevo.
                </div>
            </form>
        </div>
        
        <p class="footer-text">© 2026 JC PATH LAB. Todos los derechos reservados. <br> Seguridad de Grado Médico.</p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('errorMessage');

            // VALIDACIÓN SOBERANA
            if (user === 'JCPATHLAB2026' && pass === 'Betasporina1g') {
                error.style.display = 'none';
                // Efecto de carga premium antes de redirección
                const btn = e.target.querySelector('.login-btn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ACCEDIENDO...';
                btn.style.opacity = '0.7';
                
                setTimeout(() => {
                    window.location.href = 'https://informes-srjunco.vercel.app/login';
                }, 1000);
            } else {
                error.style.display = 'block';
                // Reset shakes
                error.style.animation = 'none';
                void error.offsetWidth;
                error.style.animation = 'shake 0.5s ease-in-out';
            }
        });
    </script>

</body>
</html>
