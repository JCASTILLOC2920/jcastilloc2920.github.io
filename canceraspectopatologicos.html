    <script>
        let currentSlideIndex = 0;
        const slides = document.querySelectorAll('.slide');

        function showSlide(index) {
            slides.forEach((slide, i) => {
                slide.classList.remove('active');
                if (i === index) {
                    slide.classList.add('active');
                }
            });
        }

        function changeSlide(n) {
            currentSlideIndex += n;
            if (currentSlideIndex >= slides.length) {
                currentSlideIndex = 0; // Vuelve al principio
            }
            if (currentSlideIndex < 0) {
                currentSlideIndex = slides.length - 1; // Va al final
            }
            showSlide(currentSlideIndex);
        }

        // Lee el parámetro 'slide' de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const slideToShow = parseInt(urlParams.get('slide'), 10);

        // Si el parámetro es un número válido, actualiza el índice
        if (!isNaN(slideToShow) && slideToShow > 0 && slideToShow <= slides.length) {
            currentSlideIndex = slideToShow - 1; // -1 porque los arrays son base 0
        }

        // Mostrar la diapositiva correcta al cargar
        showSlide(currentSlideIndex);
    </script>
