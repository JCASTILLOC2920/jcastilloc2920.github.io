    <style>
        body {
            font-family: sans-serif;
            margin: 0;
        }

        .slideshow-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #2c3e50; /* Fondo oscuro para resaltar el video */
        }

        .slide {
            display: none;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            color: white;
        }

        .slide.active {
            display: flex;
        }

        .slide h2 {
            font-size: 2em;
            margin-bottom: 20px;
        }

        .slide iframe {
            width: 80vw;
            height: 45vw; /* Proporción 16:9 */
            max-width: 1120px;
            max-height: 630px;
            border: 3px solid white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            margin-top: -22px;
            color: white;
            font-weight: bold;
            font-size: 24px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
            background-color: rgba(0,0,0,0.5);
            z-index: 10;
        }

        .next {
            right: 0;
            border-radius: 3px 0 0 3px;
        }
        
        .prev {
            left: 0;
        }

        .prev:hover, .next:hover {
            background-color: rgba(0,0,0,0.8);
        }

        .slide-number {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: #ccc;
            background-color: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 10px;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            padding: 10px 15px;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid white;
            transition: background-color 0.3s;
        }
        .back-button:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
    </style>

    <script>
        let currentSlideIndex = 0;
        const slides = document.querySelectorAll('.slide');

        function showSlide(index) {
            slides.forEach((slide, i) => {
                slide.classList.remove('active');
                if (i === index) {
                    slide.classList.add('active');
                }
            });
        }

        function changeSlide(n) {
            currentSlideIndex += n;
            if (currentSlideIndex >= slides.length) {
                currentSlideIndex = 0; // Vuelve al principio
            }
            if (currentSlideIndex < 0) {
                currentSlideIndex = slides.length - 1; // Va al final
            }
            showSlide(currentSlideIndex);
        }

        // Lee el parámetro 'slide' de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const slideToShow = parseInt(urlParams.get('slide'), 10);

        // Si el parámetro es un número válido, actualiza el índice
        if (!isNaN(slideToShow) && slideToShow > 0 && slideToShow <= slides.length) {
            currentSlideIndex = slideToShow - 1; // -1 porque los arrays son base 0
        }

        // Mostrar la diapositiva correcta al cargar
        showSlide(currentSlideIndex);
    </script>
